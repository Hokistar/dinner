<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dinner Order Lookup</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:24px;max-width:980px}
    h1{margin:0 0 6px}
    .sub{color:#555;margin:0 0 16px}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0 18px}
    input,select{padding:10px;font-size:16px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:10px;text-align:left;vertical-align:top}
    th{background:#f3f3f3}
    .note{color:#666;font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <h1>🍽️ Dinner Order Lookup</h1>
  <p class="sub">Type your name (or part of it) — or enter your table number.</p>

  <div class="row">
    <input id="q" placeholder="e.g., Ashley or 7" size="28"/>
    <select id="date">
      <option value="">Both days</option>
      <option value="19th May 2026">19th May 2026</option>
      <option value="20th May 2026">20th May 2026</option>
    </select>
  </div>

  <table>
    <thead>
      <tr><th>Date</th><th>Table</th><th>Name</th><th>Starter</th><th>Main</th><th>Dessert</th></tr>
    </thead>
    <tbody id="out"></tbody>
  </table>

  <div class="note">Tip: Searching “7” will match Table 7. Searching “Ash” will match Ashley, Ashleigh, etc.</div>

<script>
  const CSV_URL = "PublicOrders.csv";
  let rows = [];

  const norm = s => (s||"").toString().trim().toUpperCase();

  // Robust CSV split (handles quoted commas)
  function splitCSVLine(line){
    const re = /,(?=(?:[^"]*"[^"]*")*[^"]*$)/g;
    return line.split(re).map(c => c.replace(/^"|"$/g,"").trim());
  }

  async function loadCSV(){
    const text = await (await fetch(CSV_URL)).text();
    const lines = text.split(/\r?\n/).filter(l => l.trim().length);

    const header = splitCSVLine(lines.shift());
    const idx = Object.fromEntries(header.map((h,i)=>[h,i]));

    rows = lines.map(line=>{
      const cols = splitCSVLine(line);
      return {
        Date: cols[idx["Date"]] || "",
        Table: (cols[idx["Table Number"]] || "").trim(),
        Name: cols[idx["Guest Name"]] || "",
        Starter: cols[idx["Starter"]] || "",
        Main: cols[idx["Main Course"]] || "",
        Dessert: cols[idx["Dessert"]] || "",
        NName: norm(cols[idx["Guest Name"]]),
      };
    });

    render();
  }

  function render(){
    const qRaw = document.getElementById("q").value.trim();
    const q = norm(qRaw);
    const d = document.getElementById("date").value;

    const tableQuery = qRaw.match(/^\d+$/) ? qRaw : null;

    const filtered = rows.filter(r=>{
      const matchDate = !d || r.Date === d;
      const matchQuery =
        !q ? true :
        tableQuery ? (r.Table === tableQuery) :
        r.NName.includes(q);
      return matchDate && matchQuery;
    }).slice(0,250);

    const out = document.getElementById("out");
    out.innerHTML = filtered.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Table}</td>
        <td>${r.Name}</td>
        <td>${r.Starter}</td>
        <td>${r.Main}</td>
        <td>${r.Dessert}</td>
      </tr>`).join("");
  }

  document.getElementById("q").addEventListener("input", render);
  document.getElementById("date").addEventListener("change", render);
  loadCSV();
</script>
</body>
</html>
