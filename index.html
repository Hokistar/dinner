<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dinner Order Lookup</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:24px;max-width:980px}
    h1{margin:0 0 6px}
    .sub{color:#555;margin:0 0 16px}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0 18px}
    input,select{padding:10px;font-size:16px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:10px;text-align:left;vertical-align:top}
    th{background:#f3f3f3}
    .note{color:#666;font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <h1>🍽️ Dinner Order Lookup</h1>
  <p class="sub">Type your name (or part of it) — or enter your table number.</p>

<div class="row">
  <input id="q" placeholder="e.g., Ashley or 7" size="28"/>
  <select id="date">
    <option value="">Both days</option>
    <option value="19th May 2026">19th May 2026</option>
    <option value="20th May 2026">20th May 2026</option>
  </select>

  <button id="searchBtn" style="padding:10px 14px;font-size:16px;">Search</button>
  <button id="clearBtn" style="padding:10px 14px;font-size:16px;">Clear</button>
</div>

<div id="status" class="note"></div>

  <table>
    <thead>
      <tr><th>Date</th><th>Table</th><th>Name</th><th>Starter</th><th>Main</th><th>Dessert</th></tr>
    </thead>
    <tbody id="out"></tbody>
  </table>

  <div class="note">Tip: Searching “7” will match Table 7. Searching “Ash” will match Ashley, Ashleigh, etc.</div>

<script>
  const CSV_URL = "PublicOrders.csv";
  let rows = [];
  let hasSearched = false; // <-- key privacy flag

  const norm = s => (s||"").toString().trim().toUpperCase();

  function splitCSVLine(line){
    const re = /,(?=(?:[^"]*"[^"]*")*[^"]*$)/g;
    return line.split(re).map(c => c.replace(/^"|"$/g,"").trim());
  }

  async function loadCSV(){
    const text = await (await fetch(CSV_URL)).text();
    const lines = text.split(/\r?\n/).filter(l => l.trim().length);

    const header = splitCSVLine(lines.shift());
    const idx = Object.fromEntries(header.map((h,i)=>[h,i]));

    rows = lines.map(line=>{
      const cols = splitCSVLine(line);
      return {
        Date: cols[idx["Date"]] || "",
        Table: (cols[idx["Table Number"]] || "").trim(),
        Name: cols[idx["Guest Name"]] || "",
        Starter: cols[idx["Starter"]] || "",
        Main: cols[idx["Main Course"]] || "",
        Dessert: cols[idx["Dessert"]] || "",
        NName: norm(cols[idx["Guest Name"]]),
      };
    });

    // Do NOT render results on load — keep hidden
    setStatus("Enter a name (min 2 letters) or a table number, then click Search.");
    clearResults();
  }

  function setStatus(msg){
    document.getElementById("status").textContent = msg || "";
  }

  function clearResults(){
    document.getElementById("out").innerHTML = "";
  }

  function runSearch(){
    hasSearched = true;

    const qRaw = document.getElementById("q").value.trim();
    const d = document.getElementById("date").value;

    // Block empty searches (prevents full list exposure)
    if (!qRaw){
      setStatus("Please type a name or table number before searching.");
      clearResults();
      return;
    }

    // Table search if numeric-only
    const tableQuery = qRaw.match(/^\d+$/) ? qRaw : null;

    // For name searches, require at least 2 characters (privacy + usability)
    if (!tableQuery && qRaw.length < 2){
      setStatus("Please type at least 2 letters of your name (or enter a table number).");
      clearResults();
      return;
    }

    const q = norm(qRaw);

    const filtered = rows.filter(r=>{
      const matchDate = !d || r.Date === d;
      const matchQuery =
        tableQuery ? (r.Table === tableQuery) :
        r.NName.includes(q);
      return matchDate && matchQuery;
    }).slice(0,250);

    if (filtered.length === 0){
      setStatus("No matches found. Try a different spelling or just your table number.");
      clearResults();
      return;
    }

    setStatus(`Showing ${filtered.length} RESULT(s).`);
    const out = document.getElementById("out");
    out.innerHTML = filtered.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Table}</td>
        <td>${r.Name}</td>
        <td>${r.Starter}</td>
        <td>${r.Main}</td>
        <td>${r.Dessert}</td>
      </tr>`).join("");
  }

  function clearSearch(){
    document.getElementById("q").value = "";
    document.getElementById("date").value = "";
    hasSearched = false;
    setStatus("Enter a name (min 2 letters) or a table number, then click Search.");
    clearResults();
  }

  // Wire up buttons
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("searchBtn").addEventListener("click", runSearch);
    document.getElementById("clearBtn").addEventListener("click", clearSearch);

    // Optional: Press Enter to search
    document.getElementById("q").addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch();
    });
  });

  loadCSV();
</script>
</body>
</html>
